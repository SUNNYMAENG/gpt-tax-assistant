<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title id="title">GPT 세무 비서</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-900 font-sans p-6">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-md">
      <h1 id="title" class="text-2xl font-bold mb-6 text-center">GPT 세무 비서에 질문해보세요</h1>

      <div class="mb-6">
        <label for="userMessage" id="label" class="block text-sm font-semibold text-gray-700 mb-2">세금 질문:</label>
        <input type="text" id="userMessage" name="userMessage" placeholder="세금 관련 질문을 입력하세요" required
          class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-300" />
        <button type="button" id="button"
          class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 w-full">질문 보내기</button>
      </div>

    <script>
      const lang = navigator.language || navigator.userLanguage;
      const i18n = {
        ko: { title: "GPT 세무 비서에 질문해보세요", label: "세금 질문:", button: "질문 보내기", pdf: "PDF 받기", csv: "엑셀 받기" },
        ja: { title: "GPT税務アシスタントに質問してみてください", label: "質問：", button: "送信", pdf: "PDFをダウンロード", csv: "CSVを取得" },
        zh: { title: "向 GPT 税务助理提问", label: "问题：", button: "发送问题", pdf: "下载 PDF", csv: "下载 CSV" },
        en: { title: "Ask the GPT Tax Assistant", label: "Question:", button: "Send", pdf: "Download PDF", csv: "Download CSV" }
      };
      const currentLang = lang.startsWith("ja") ? "ja" : lang.startsWith("ko") ? "ko" : lang.startsWith("zh") ? "zh" : "en";
      const t = i18n[currentLang];
      document.getElementById("title").textContent = t.title;
      document.getElementById("label").textContent = t.label;
      document.getElementById("button").textContent = t.button;
      
      // fetch로 POST 전송
      document.getElementById('button').addEventListener('click', async () => {
        const message = document.getElementById('userMessage').value;
        if (!message.trim()) return alert('질문을 입력해주세요!');

        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userMessage: message })
        });

        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
        handleUserMessageFromServer(html); // ✅ GPT 응답 분석 및 계산 실행

      });
    </script><script src="/chat.js"></script>
  </body>
</html>
<script src="/chat.js"></script>
